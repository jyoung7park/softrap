<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의 — Softrap</title>
  <meta name="description" content="Softrap 제휴 문의 페이지입니다. 광고, 콘텐츠 제휴, 기술 협력 문의를 남겨주세요.">
  <meta name="robots" content="index, follow">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="contact.css">
  <meta name="google-adsense-account" content="ca-pub-8717722754583942">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8717722754583942" crossorigin="anonymous"></script>
</head>
<body>
  <button id="theme-toggle" aria-label="테마 전환">🌙</button>
  <div class="container contact-container">
    <a href="index.html" class="back-link">← 홈으로</a>
    <h1>제휴 문의</h1>
    <p class="subtitle">비즈니스 제휴 및 협업 문의를 남겨주세요.</p>

    <form id="contact-form" action="https://formspree.io/f/xjglyrza" method="POST">
      <input type="hidden" name="_subject" value="[softrap] 제휴 문의">
      <input type="hidden" name="_next" value="https://softrap.pages.dev/contact.html?sent=1">

      <div class="form-group">
        <label for="name">이름 *</label>
        <input type="text" id="name" name="name" placeholder="홍길동" required>
      </div>

      <div class="form-group">
        <label for="company">회사명</label>
        <input type="text" id="company" name="company" placeholder="(주)회사이름">
      </div>

      <div class="form-group">
        <label for="email">이메일 *</label>
        <input type="email" id="email" name="email" placeholder="example@company.com" required>
      </div>

      <div class="form-group">
        <label for="type">문의 유형 *</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>선택해주세요</option>
          <option value="광고/마케팅">광고 / 마케팅</option>
          <option value="콘텐츠 제휴">콘텐츠 제휴</option>
          <option value="기술 협력">기술 협력</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">문의 내용 *</label>
        <textarea id="message" name="message" rows="5" placeholder="문의 내용을 자세히 적어주세요." required></textarea>
      </div>

      <button type="submit" id="submit-btn">문의 보내기</button>
    </form>

    <div id="success-msg" class="success-msg" style="display:none;">
      ✅ 문의가 성공적으로 전송되었습니다. 빠른 시일 내 답변드리겠습니다.
    </div>
  </div>
  <script src="main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('sent') === '1') {
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    }
  </script>

  <div class="disqus-section">
    <h2>댓글</h2>
    <div id="disqus_thread"></div>
    <script>
      var disqus_config = function () {
        this.page.url = 'https://softrap.pages.dev/contact.html';
        this.page.identifier = 'contact';
      };
      (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://softrap.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화해주세요. <a href="https://disqus.com/?ref_noscript">Disqus로 제공되는 댓글</a></noscript>
  </div>
  <script id="dsq-count-scr" src="//softrap.disqus.com/count.js" async></script>

  <footer class="site-footer">
    <nav class="footer-nav">
      <a href="index.html">홈</a>
      <a href="animal.html">동물상 테스트</a>
      <a href="about.html">소개</a>
      <a href="privacy.html">개인정보처리방침</a>
      <a href="contact.html">제휴 문의</a>
    </nav>
    <p class="footer-copy">© 2026 Softrap. All rights reserved.</p>
  </footer>
</body>
</html>
